<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - Smart Navara City</title>

    <script>
        try {
            const savedFrontendTheme = localStorage.getItem('navaraFrontendTheme') || 'light';
            document.documentElement.setAttribute('data-theme', savedFrontendTheme);
        } catch (error) {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --teal-dark: #063f47;
            --teal-main: #0a6b6b;
            --teal-soft: #66a5ad;
            --mint: #c4dfe6;
            --mint-light: #edf8f8;
            --page-bg: #eef7f8;
            --text-main: #17363b;
            --text-muted: #6c8589;
            --line-soft: rgba(10, 107, 107, 0.14);
            --shadow-soft: 0 18px 40px rgba(6, 63, 71, 0.10);
            --shadow-card: 0 10px 28px rgba(6, 63, 71, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(102, 165, 173, 0.22) 0%, transparent 26%),
                radial-gradient(circle at bottom right, rgba(196, 223, 230, 0.50) 0%, transparent 30%),
                linear-gradient(180deg, #f8fcfd 0%, #eef7f8 52%, #e4f2f4 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(10, 107, 107, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10, 107, 107, 0.04) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(180deg, rgba(0,0,0,0.85), rgba(0,0,0,0.08));
        }

        .spa-container {
            min-height: calc(100vh - 86px);
            position: relative;
            z-index: 2;
        }

        .navbar-custom {
            position: sticky;
            top: 0;
            z-index: 1030;
            background:
                linear-gradient(90deg, rgba(6, 63, 71, 0.98), rgba(10, 107, 107, 0.96)),
                radial-gradient(circle at top right, rgba(196, 223, 230, 0.22), transparent 30%);
            box-shadow: 0 12px 28px rgba(6, 63, 71, 0.18);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            letter-spacing: -0.03em;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 16px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }

        #logout-btn-navbar {
            display: none;
            background: rgba(255,255,255,0.95);
            color: var(--teal-dark);
            border: 0;
            border-radius: 999px;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 800;
            min-width: 122px;
            transition: all 0.22s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.13);
        }

        #logout-btn-navbar:hover {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0,0,0,0.18);
        }

        .card {
            border-radius: 24px !important;
        }

        .soft-card {
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(255,255,255,0.70);
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(12px);
        }

        .dashboard-hero {
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            padding: 1.4rem;
            margin-bottom: 1.4rem;
            color: #ffffff;
            background:
                radial-gradient(circle at top right, rgba(196, 223, 230, 0.28), transparent 34%),
                linear-gradient(135deg, var(--teal-dark), var(--teal-main));
            box-shadow: var(--shadow-soft);
        }

        .dashboard-hero::after {
            content: "";
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            right: -60px;
            top: -60px;
            background: rgba(255,255,255,0.12);
        }

        .hero-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            padding: 7px 13px;
            font-size: 0.82rem;
            font-weight: 800;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.22);
            margin-bottom: 10px;
        }

        .hero-title {
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.35rem;
        }

        .hero-subtitle {
            color: rgba(255,255,255,0.88);
            margin-bottom: 0;
            max-width: 650px;
            line-height: 1.7;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--teal-main), var(--teal-soft)) !important;
            border: none !important;
            box-shadow: 0 10px 22px rgba(10, 107, 107, 0.22);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--teal-dark), var(--teal-main)) !important;
            transform: translateY(-1px);
        }

        .btn-outline-primary {
            color: var(--teal-main) !important;
            border-color: rgba(10, 107, 107, 0.35) !important;
            background: rgba(255,255,255,0.62);
        }

        .btn-outline-primary:hover {
            color: #ffffff !important;
            background: var(--teal-main) !important;
            border-color: var(--teal-main) !important;
        }

        .btn {
            border-radius: 15px;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .form-control,
        .form-select {
            border-radius: 16px;
            border: 1px solid var(--line-soft);
            padding: 0.85rem 1rem;
            background-color: rgba(255,255,255,0.92);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: rgba(10, 107, 107, 0.45);
            box-shadow: 0 0 0 0.22rem rgba(10, 107, 107, 0.12);
        }

        .modal-content {
            border-radius: 28px;
            overflow: hidden;
        }

        .modal-header-custom {
            color: #ffffff;
            background:
                radial-gradient(circle at top right, rgba(196, 223, 230, 0.28), transparent 32%),
                linear-gradient(135deg, var(--teal-dark), var(--teal-main));
            border-bottom: 0;
            padding: 1.2rem 1.45rem;
        }

        .badge {
            border-radius: 999px;
            padding: 0.5rem 0.75rem;
            font-weight: 800;
        }

        .summary-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.78rem 0.85rem;
            border-radius: 16px;
            background: rgba(237, 248, 248, 0.78);
            border: 1px solid rgba(10, 107, 107, 0.08);
            margin-bottom: 0.55rem;
        }

        .summary-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .report-card {
            border: 1px solid rgba(10, 107, 107, 0.10) !important;
            background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(247,252,253,0.94));
            transition: all 0.22s ease;
        }

        .report-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 34px rgba(6, 63, 71, 0.12) !important;
        }

        .report-icon {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 107, 107, 0.10);
            color: var(--teal-main);
            flex-shrink: 0;
        }

        .small-muted {
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .progress {
            border-radius: 999px;
            background-color: rgba(10, 107, 107, 0.10);
            overflow: hidden;
        }

        .pagination .page-link {
            color: var(--teal-main);
            border-radius: 13px;
            border: 1px solid rgba(10, 107, 107, 0.14);
            margin: 0 3px;
            font-weight: 700;
        }

        .pagination .active .page-link {
            background: var(--teal-main);
            border-color: var(--teal-main);
            color: #ffffff;
        }

        .profile-avatar {
            width: 86px;
            height: 86px;
            border-radius: 28px;
            background:
                radial-gradient(circle at top right, rgba(255,255,255,0.62), transparent 40%),
                linear-gradient(135deg, var(--teal-main), var(--teal-soft));
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px rgba(10, 107, 107, 0.20);
        }

        .login-shell {
            min-height: calc(100vh - 140px);
            display: flex;
            align-items: center;
        }

        .login-info {
            color: #ffffff;
            background:
                radial-gradient(circle at top right, rgba(196, 223, 230, 0.26), transparent 34%),
                linear-gradient(135deg, var(--teal-dark), var(--teal-main));
            border-radius: 32px;
            box-shadow: var(--shadow-soft);
            min-height: 440px;
            position: relative;
            overflow: hidden;
        }

        .login-info::after {
            content: "";
            position: absolute;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: rgba(255,255,255,0.10);
            right: -90px;
            bottom: -90px;
        }

        .login-card {
            border: 1px solid rgba(255,255,255,0.72);
            background: rgba(255,255,255,0.90);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-soft);
        }


        /* Dark / Light Toggle */
        .theme-toggle-frontend {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-width: 98px;
            min-height: 42px;
            margin-right: 10px;
            padding: 10px 18px;
            border: 1px solid rgba(255,255,255,0.24);
            border-radius: 999px;
            background: rgba(255,255,255,0.14);
            color: #ffffff;
            font-size: 14px;
            font-weight: 800;
            transition: all 0.22s ease;
        }

        .theme-toggle-frontend:hover {
            background: rgba(255,255,255,0.22);
            transform: translateY(-2px);
        }

        .theme-toggle-frontend i {
            font-size: 14px;
        }

        /* Dark Mode */
        html[data-theme="dark"] {
            --teal-dark: #04191d;
            --teal-main: #0b3c43;
            --teal-soft: #2e7e88;
            --mint: #143b42;
            --mint-light: #102f35;
            --page-bg: #061a1f;
            --text-main: #e8f6f7;
            --text-muted: #a8c8cc;
            --line-soft: rgba(255,255,255,0.12);
            --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.34);
            --shadow-card: 0 12px 30px rgba(0, 0, 0, 0.28);
        }

        html[data-theme="dark"] body {
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(46, 126, 136, 0.20) 0%, transparent 28%),
                radial-gradient(circle at bottom right, rgba(102, 165, 173, 0.12) 0%, transparent 30%),
                linear-gradient(180deg, #061a1f 0%, #09282e 52%, #05161a 100%);
        }

        html[data-theme="dark"] body::before {
            background-image:
                linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
        }

        html[data-theme="dark"] .navbar-custom {
            background:
                linear-gradient(90deg, rgba(4, 25, 29, 0.98), rgba(8, 47, 53, 0.96)),
                radial-gradient(circle at top right, rgba(102, 165, 173, 0.18), transparent 30%);
            box-shadow: 0 12px 30px rgba(0,0,0,0.36);
        }

        html[data-theme="dark"] .brand-mark,
        html[data-theme="dark"] .theme-toggle-frontend {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.20);
            color: #ffffff;
        }

        html[data-theme="dark"] #logout-btn-navbar {
            background: rgba(255,255,255,0.92);
            color: #04191d;
        }

        html[data-theme="dark"] .soft-card,
        html[data-theme="dark"] .login-card,
        html[data-theme="dark"] .report-card,
        html[data-theme="dark"] .modal-content {
            background: linear-gradient(180deg, rgba(16, 54, 61, 0.96), rgba(9, 38, 43, 0.96)) !important;
            border-color: rgba(255,255,255,0.10) !important;
            box-shadow: var(--shadow-card) !important;
            color: var(--text-main);
        }

        html[data-theme="dark"] .dashboard-hero,
        html[data-theme="dark"] .login-info,
        html[data-theme="dark"] .modal-header-custom {
            background:
                radial-gradient(circle at top right, rgba(102, 165, 173, 0.18), transparent 34%),
                linear-gradient(135deg, #04191d, #0b3c43 60%, #2e7e88);
            color: #ffffff;
            box-shadow: var(--shadow-soft);
        }

        html[data-theme="dark"] .summary-row,
        html[data-theme="dark"] .input-group-text,
        html[data-theme="dark"] .pagination .page-link {
            background: rgba(255,255,255,0.07) !important;
            border-color: rgba(255,255,255,0.12) !important;
            color: var(--text-main) !important;
        }

        html[data-theme="dark"] h1,
        html[data-theme="dark"] h2,
        html[data-theme="dark"] h3,
        html[data-theme="dark"] h4,
        html[data-theme="dark"] h5,
        html[data-theme="dark"] h6,
        html[data-theme="dark"] .summary-label,
        html[data-theme="dark"] .fw-bold,
        html[data-theme="dark"] .fw-semibold,
        html[data-theme="dark"] .navbar-brand,
        html[data-theme="dark"] .report-card h5 {
            color: var(--text-main) !important;
        }

        html[data-theme="dark"] p,
        html[data-theme="dark"] small,
        html[data-theme="dark"] .text-muted,
        html[data-theme="dark"] .small-muted,
        html[data-theme="dark"] .hero-subtitle {
            color: var(--text-muted) !important;
        }

        html[data-theme="dark"] .dashboard-hero *,
        html[data-theme="dark"] .login-info *,
        html[data-theme="dark"] .modal-header-custom *,
        html[data-theme="dark"] .navbar-custom * {
            color: #ffffff;
        }

        html[data-theme="dark"] .btn-light,
        html[data-theme="dark"] .btn-light * {
            background: #ffffff !important;
            color: #04191d !important;
            border-color: #ffffff !important;
        }

        html[data-theme="dark"] .btn-primary {
            background: linear-gradient(135deg, #0b3c43, #2e7e88) !important;
            color: #ffffff !important;
            box-shadow: 0 10px 24px rgba(0,0,0,0.26);
        }

        html[data-theme="dark"] .btn-outline-primary {
            color: #d7f4f6 !important;
            background: rgba(255,255,255,0.07) !important;
            border-color: rgba(255,255,255,0.18) !important;
        }

        html[data-theme="dark"] .btn-outline-primary:hover {
            color: #ffffff !important;
            background: #2e7e88 !important;
            border-color: #2e7e88 !important;
        }

        html[data-theme="dark"] .btn-outline-secondary {
            color: #d7f4f6 !important;
            border-color: rgba(255,255,255,0.18) !important;
            background: rgba(255,255,255,0.06) !important;
        }

        html[data-theme="dark"] .form-control,
        html[data-theme="dark"] .form-select {
            background-color: rgba(255,255,255,0.08) !important;
            border-color: rgba(255,255,255,0.14) !important;
            color: var(--text-main) !important;
        }

        html[data-theme="dark"] .form-control::placeholder {
            color: rgba(232,246,247,0.55);
        }

        html[data-theme="dark"] .form-control:focus,
        html[data-theme="dark"] .form-select:focus {
            background-color: rgba(255,255,255,0.12) !important;
            border-color: rgba(102,165,173,0.72) !important;
            box-shadow: 0 0 0 0.22rem rgba(102,165,173,0.16);
            color: #ffffff !important;
        }

        html[data-theme="dark"] .report-icon,
        html[data-theme="dark"] .profile-avatar {
            background:
                radial-gradient(circle at top right, rgba(255,255,255,0.20), transparent 40%),
                linear-gradient(135deg, #0b3c43, #2e7e88);
            color: #ffffff;
        }

        html[data-theme="dark"] .progress {
            background-color: rgba(255,255,255,0.10);
        }

        html[data-theme="dark"] .pagination .active .page-link {
            background: #2e7e88 !important;
            border-color: #2e7e88 !important;
            color: #ffffff !important;
        }

        html[data-theme="dark"] .report-card .badge[style] {
            background: rgba(102, 165, 173, 0.18) !important;
            color: #d7f4f6 !important;
            border: 1px solid rgba(102, 165, 173, 0.24);
        }

        html[data-theme="dark"] .text-primary {
            color: #8fd6de !important;
        }

        html[data-theme="dark"] .text-dark:not(.badge) {
            color: var(--text-main) !important;
        }

        html[data-theme="dark"] hr {
            border-color: rgba(255,255,255,0.14);
            opacity: 1;
        }

        html[data-theme="dark"] .alert,
        html[data-theme="dark"] .text-center.text-muted {
            color: var(--text-muted) !important;
        }

        @media (max-width: 991px) {
            .dashboard-hero {
                padding: 1.15rem;
            }

            .login-info {
                min-height: auto;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <span class="brand-mark">
                    <i class="bi bi-buildings-fill fs-4"></i>
                </span>
                <span>Smart Navara City Portal</span>
            </a>

            <div class="ms-auto d-flex align-items-center gap-2">
                <button class="theme-toggle-frontend" id="themeToggleFrontend" type="button">
                    <i class="bi bi-moon-stars" id="themeToggleFrontendIcon"></i>
                    <span id="themeToggleFrontendText">Dark</span>
                </button>

                <button id="logout-btn-navbar">
                    <i class="bi bi-box-arrow-right me-1"></i>
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Konten SPA -->
    <main class="container-fluid px-4 py-4 spa-container" id="app-content"></main>

    <!-- Modal Laporan -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow">

                <div class="modal-header modal-header-custom">
                    <div>
                        <span class="hero-kicker mb-2">
                            <i class="bi bi-clipboard-plus"></i>
                            Citizen Report
                        </span>
                        <h5 class="modal-title fw-bold mb-0" id="reportModalLabel">
                            Buat Laporan Baru
                        </h5>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4">
                    <form id="reportForm">

                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Judul Laporan</label>
                                <input type="text" class="form-control" id="title" placeholder="Contoh: Jalan berlubang di dekat pasar" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Kategori</label>
                                <select id="category" class="form-select" required>
                                    <option value="">Pilih Kategori</option>
                                    <option value="Lingkungan">Lingkungan</option>
                                    <option value="Infrastruktur">Infrastruktur</option>
                                    <option value="Drainase">Drainase</option>
                                    <option value="Jalan Rusak">Jalan Rusak</option>
                                    <option value="Sampah">Sampah</option>
                                    <option value="Lampu Mati">Lampu Mati</option>
                                    <option value="Keamanan">Keamanan</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Lokasi</label>
                                <input type="text" class="form-control" id="location" placeholder="Contoh: Kecamatan Rajabasa" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">Deskripsi</label>
                                <textarea id="description" rows="4" class="form-control" placeholder="Tuliskan detail masalah yang ingin dilaporkan..." required></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between flex-wrap gap-2 mt-4">
                            <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft">
                                <i class="bi bi-file-earmark-text me-1"></i>
                                Simpan Draft
                            </button>
                            <button type="button" class="btn btn-primary fw-bold px-4" id="btnSubmit">
                                Ajukan
                                <i class="bi bi-send-fill ms-1"></i>
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const themeButton = document.getElementById('themeToggleFrontend');
            const themeIcon = document.getElementById('themeToggleFrontendIcon');
            const themeText = document.getElementById('themeToggleFrontendText');

            let currentTheme = 'light';

            try {
                currentTheme = localStorage.getItem('navaraFrontendTheme') || 'light';
            } catch (error) {
                currentTheme = 'light';
            }

            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeButton(currentTheme);

            if (themeButton) {
                themeButton.addEventListener('click', function () {
                    const activeTheme = document.documentElement.getAttribute('data-theme');
                    const nextTheme = activeTheme === 'dark' ? 'light' : 'dark';

                    document.documentElement.setAttribute('data-theme', nextTheme);

                    try {
                        localStorage.setItem('navaraFrontendTheme', nextTheme);
                    } catch (error) {
                        console.log('Theme tidak bisa disimpan.');
                    }

                    updateThemeButton(nextTheme);
                });
            }

            function updateThemeButton(theme) {
                if (!themeIcon || !themeText) return;

                if (theme === 'dark') {
                    themeIcon.className = 'bi bi-sun';
                    themeText.textContent = 'Light';
                } else {
                    themeIcon.className = 'bi bi-moon-stars';
                    themeText.textContent = 'Dark';
                }
            }
        });
    </script>
