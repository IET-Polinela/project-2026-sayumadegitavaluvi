{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block extra_head %}
<style>
    .hero-section {
        min-height: calc(100vh - 140px);
        margin-bottom: 0;
        display: flex;
        align-items: center;
    }

    .hero-inner {
        width: 100%;
        padding: 0;
    }

    .site-wrap {
        padding-bottom: 1.5rem;
    }

    .footer-note {
        display: block;
        margin-top: 1.2rem;
    }

    @media (max-width: 991px) {
        .hero-section {
            min-height: calc(100vh - 120px);
        }

        .hero-inner {
            padding: 3rem 0;
        }
    }
</style>
{% endblock %}

{% block hero %}
<section class="hero-section">
    <div class="container hero-inner">
        <div class="row justify-content-center text-center">
            <div class="col-lg-8">
                <span class="hero-kicker">Smart City Issue Reporting</span>
                <h1 class="hero-title mx-auto">Selamat Datang</h1>
                <p class="hero-text mx-auto">
                    Sistem pelaporan masalah kota berbasis web.
                </p>

                <div class="d-flex justify-content-center flex-wrap gap-3 mt-4">
                    <a href="{% url 'report_list' %}" class="btn btn-light hero-btn">Lihat Laporan</a>
                    <a href="{% url 'add_report' %}" class="btn btn-brand-outline hero-btn">Tambah Laporan</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block content %}{% endblock %}
